<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ha Giang Travel Guide - CNDPT</title>
    <!-- CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; scroll-behavior: smooth; }
        .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
        /* Hiệu ứng mượt cho Chat AI */
        #chat-window.hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <!-- 1. THANH ĐIỀU HƯỚNG (NAVBAR) -->
    <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-[60] border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-mountain text-emerald-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-tighter">HA GIANG EXPLORE</span>
            </div>
            
            <!-- Ô TÌM KIẾM (ID: search-input) -->
            <div class="relative w-full md:w-96">
                <input type="text" id="search-input" placeholder="Tìm địa danh, văn hóa, món ăn..." 
                    class="w-full bg-white/10 pl-10 pr-4 py-2 rounded-full border border-white/20 focus:ring-2 focus:ring-emerald-500 outline-none text-sm text-white">
                <i class="fas fa-search absolute left-4 top-3 text-white/40"></i>
            </div>

            <div class="flex space-x-6 font-semibold text-xs uppercase tracking-widest">
                <a href="#" class="text-emerald-400">Trang chủ</a>
                <a href="#destinations" class="hover:text-emerald-400 transition">Địa danh</a>
            </div>
        </div>
    </nav>

    <!-- 2. BANNER CHÍNH (HERO SECTION) -->
    <section class="relative h-[60vh] flex items-center justify-center text-center px-4 bg-cover bg-center" 
             style="background-image: url('images/anh-nenchinh.jpg');">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative z-10">
            <h1 class="text-4xl md:text-7xl font-bold mb-4 uppercase tracking-[0.2em] drop-shadow-2xl">Kỳ vĩ Hà Giang</h1>
            <p class="text-lg md:text-xl opacity-80 max-w-2xl mx-auto italic font-light">"Chạm vào mây, say giữa đại ngàn"</p>
        </div>
    </section>
    
    <!-- 3. BỘ LỌC (FILTER BUTTONS) -->
    <div class="container mx-auto px-6 py-12 flex flex-wrap justify-center gap-4">
        <button onclick="filterDestinations('all')" class="filter-btn bg-emerald-600 text-white px-8 py-2 rounded-full font-bold shadow-lg transition hover:scale-105">Tất cả</button>
        <button onclick="filterDestinations('Địa danh')" class="filter-btn bg-white/5 border border-white/10 px-8 py-2 rounded-full hover:bg-white/10 transition uppercase text-[11px] font-bold tracking-widest">Địa danh / Cảnh quan</button>
        <button onclick="filterDestinations('Văn hóa')" class="filter-btn bg-white/5 border border-white/10 px-8 py-2 rounded-full hover:bg-white/10 transition uppercase text-[11px] font-bold tracking-widest">Chuyên đề Văn hóa</button>
    </div>

    <!-- 4. LƯỚI HIỂN THỊ (ID: destination-grid) -->
    <main id="destinations" class="container mx-auto px-6 pb-32">
        <div id="destination-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- JavaScript tự đổ dữ liệu vào đây -->
        </div>
    </main>

    <!-- 5. POPUP CHI TIẾT (ID: modal) -->
    <div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-[100] hidden overflow-y-auto p-2 md:p-6">
        <div class="bg-stone-50 text-slate-900 rounded-3xl max-w-6xl mx-auto relative shadow-2xl overflow-hidden min-h-screen md:min-h-0">
            <!-- Nút đóng (closeModal) -->
            <button onclick="closeModal()" class="fixed md:absolute top-4 right-4 bg-black/50 text-white hover:bg-red-600 w-12 h-12 rounded-full transition z-[110] flex items-center justify-center shadow-xl">
                <i class="fas fa-times text-xl"></i>
            </button>
            
            <div id="modal-content">
                <!-- Nội dung chi tiết đổ vào đây -->
            </div>
        </div>
    </div>

    <!-- 6. CHAT AI TRỢ LÝ ẢO -->
    <!-- Nút mở (ID: toggleChat) -->
    <button onclick="toggleChat()" class="fixed bottom-8 right-8 bg-emerald-500 text-white w-16 h-16 rounded-full shadow-2xl z-[80] hover:bg-orange-500 hover:rotate-12 transition-all duration-300 flex items-center justify-center text-3xl">
        <i class="fas fa-robot"></i>
    </button>

    <!-- Cửa sổ Chat (ID: chat-window) -->
    <div id="chat-window" class="fixed bottom-28 right-8 w-[320px] md:w-[400px] bg-white rounded-3xl shadow-2xl z-[80] hidden flex flex-col border border-white/20 overflow-hidden text-slate-800 animate-in slide-in-from-bottom-5">
        <div class="bg-emerald-800 p-4 flex justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-emerald-800 font-bold text-xs">HG</div>
                <span class="font-bold text-sm">Trợ lý ảo Hà Giang</span>
            </div>
            <button onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div id="chat-content" class="h-96 overflow-y-auto p-4 space-y-4 bg-slate-50 flex flex-col">
            <div class="bg-emerald-100 p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] text-sm">
                Chào bạn! Tôi là AI chuyên gia Hà Giang. Bạn muốn tìm hiểu gì nào?
            </div>
        </div>
        <div class="p-4 bg-white border-t flex gap-2">
            <input type="text" id="chat-input" placeholder="Hỏi tôi về món ăn, lễ hội..." 
                class="flex-1 bg-slate-100 rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="sendMessage()" class="bg-emerald-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-orange-500 transition">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <!-- 7. FOOTER -->
    <footer class="bg-black py-16 text-center text-white/30">
        <div class="container mx-auto px-6">
            <p class="text-xs uppercase tracking-[0.3em] mb-4 font-bold">Dự án Đa Phương Tiện Hà Giang</p>
            <p class="text-[10px]">&copy; 2026 Bài kết thúc học phần môn CNDPT - Sinh viên: NGUYỄN HỒNG PHÚC</p>
        </div>
    </footer>

    <!-- LIÊN KẾT FILE JAVASCRIPT -->
    <script src="script.js"></script>
</body>
</html>
