<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hà Giang Explore - Step 2 Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #0f172a; color: white; }
        .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    </style>
</head>
<body class="bg-slate-900">

    <!-- Header -->
    <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10 p-4 flex justify-between items-center px-6">
        <h1 class="text-xl font-bold text-emerald-500">HA GIANG EXPLORE</h1>
        <div class="space-x-6 text-sm font-semibold">
            <a href="#" class="text-emerald-400">Trang chủ</a>
            <a href="#destinations" class="hover:text-emerald-400">Địa danh</a>
        </div>
    </nav>

    <!-- Banner -->
    <header class="h-[50vh] flex items-center justify-center bg-emerald-900 relative overflow-hidden">
        <div class="relative z-10 text-center">
            <h1 class="text-5xl font-bold uppercase tracking-widest">Kỳ vĩ Hà Giang</h1>
            <p class="italic opacity-70 mt-2">"Chạm vào mây, say giữa đại ngàn"</p>
        </div>
    </header>

    <!-- Lưới hiển thị -->
    <main id="destinations" class="container mx-auto px-6 py-16">
        <div id="destination-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- JS đổ dữ liệu vào đây -->
        </div>
    </main>

    <!-- CỬA SỔ POPUP (MODAL) - QUAN TRỌNG NHẤT -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white text-slate-900 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
            <!-- Nút đóng -->
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-slate-200 hover:bg-red-500 hover:text-white w-10 h-10 rounded-full transition z-10">
                <i class="fas fa-times"></i>
            </button>
            
            <div id="modal-content">
                <!-- Nội dung chi tiết sẽ hiện ở đây -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
