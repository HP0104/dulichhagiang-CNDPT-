<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ha Giang Explore - Step 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #0f172a; color: white; }
        .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    </style>
</head>
<body>

    <!-- Thanh Menu -->
    <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-mountain text-emerald-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-tighter">HA GIANG EXPLORE</span>
            </div>
            <div class="space-x-6 font-semibold text-xs uppercase tracking-widest">
                <a href="#" class="text-emerald-400">Trang chủ</a>
                <a href="#destinations" class="hover:text-emerald-400 transition">Địa danh</a>
            </div>
        </div>
    </nav>

    <!-- Banner chính -->
    <section class="relative h-[50vh] flex items-center justify-center text-center px-4 bg-emerald-900">
        <div class="relative z-10">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 uppercase tracking-[0.2em]">Kỳ vĩ Hà Giang</h1>
            <p class="text-lg opacity-80 italic">"Chạm vào mây, say giữa đại ngàn"</p>
        </div>
    </section>

    <!-- Lưới hiển thị địa danh -->
    <main id="destinations" class="container mx-auto px-6 py-16">
        <div id="destination-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- JavaScript sẽ tự đổ dữ liệu vào đây -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
