<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ha Giang Travel Guide - NGUYỄN HỒNG PHÚC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; scroll-behavior: smooth; background-color: #0f172a; }
        .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-[60] border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-mountain text-emerald-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-tighter">HA GIANG EXPLORE</span>
            </div>
            <div class="relative w-full md:w-96">
                <input type="text" id="search-input" placeholder="Tìm địa danh, văn hóa..." 
                    class="w-full bg-white/10 pl-10 pr-4 py-2 rounded-full border border-white/20 focus:ring-2 focus:ring-emerald-500 outline-none text-sm text-white">
                <i class="fas fa-search absolute left-4 top-3 text-white/40"></i>
            </div>
            <div class="flex space-x-6 font-semibold text-xs uppercase tracking-widest">
                <a href="#" class="text-emerald-400">Trang chủ</a>
                <a href="#destinations" class="hover:text-emerald-400 transition">Địa danh</a>
            </div>
        </div>
    </nav>

    <section class="relative h-[60vh] flex items-center justify-center text-center px-4 bg-cover bg-center" 
             style="background-image: url('images/anh-nenchinh.jpg');">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative z-10">
            <h1 class="text-4xl md:text-7xl font-bold mb-4 uppercase tracking-[0.2em]">Kỳ vĩ Hà Giang</h1>
            <p class="text-lg md:text-xl opacity-80 italic font-light italic">"Chạm vào mây, say giữa đại ngàn"</p>
        </div>
    </section>
